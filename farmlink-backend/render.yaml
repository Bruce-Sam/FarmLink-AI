# Render Blueprint — Afuo Market API
# https://render.com/docs/blueprint-spec
#
# Use runtime: node (recommended) OR runtime: docker (Dockerfile in this folder).

services:
  - type: web
    name: afuo-market-api
    runtime: node
    rootDir: farmlink-backend
    region: frankfurt
    plan: free
    buildCommand: npm install --include=dev && npm run render:build
    startCommand: npm run render:start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: '4000'
      - key: DATABASE_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRES_IN
        value: 7d
      - key: CORS_ORIGINS
        sync: false
      - key: LOG_LEVEL
        value: info
      - key: AI_PROVIDER
        value: local
      - key: RATE_LIMIT_WINDOW_MS
        value: '900000'
      - key: RATE_LIMIT_MAX
        value: '300'
      - key: AUTH_RATE_LIMIT_MAX
        value: '20'
